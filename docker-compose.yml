version: '3.8'

services:
  # Proof Artifact API Service
  proof-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certen-proof-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-certen}:${POSTGRES_PASSWORD:-certen_dev}@certen-postgres:5432/${POSTGRES_DB:-certen_proofs}?sslmode=disable
      API_PORT: 8080
      SERVICE_ID: proof-service-1
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      DEVELOPMENT_MODE: ${DEVELOPMENT_MODE:-true}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - certen-validators_certen-net

  # Proof Explorer Frontend (React)
  proof-explorer:
    build:
      context: ./web/proof-explorer
      dockerfile: Dockerfile
    container_name: certen-proof-explorer
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-8080}
    ports:
      - "${EXPLORER_PORT:-3000}:80"
    depends_on:
      - proof-service
    restart: unless-stopped

networks:
  certen-validators_certen-net:
    external: true
